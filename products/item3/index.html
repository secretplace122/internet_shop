<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>111 – Магазин</title>
  <meta name="description" content="222">
  <base href="/internet_shop/">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/product.css">
  <script>window.PRODUCT_ID = 'item3';</script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/product.js"></script>
</head>
<body>
  <nav id="main-nav" class="main-nav">
    <div class="nav-pill" id="nav-pill">
      <button class="nav-toggle" id="nav-toggle" aria-label="Меню">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16M4 12h16M4 19h16"/></svg>
        <span class="nav-brand">Магазин</span>
      </button>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link">Главная</a>
        <a href="index.html#catalog" class="nav-link">Каталог</a>
        <a href="#" class="nav-link" id="nav-cart">Корзина</a>
        <a href="index.html#info" class="nav-link">Контакты</a>
      </div>
    </div>
  </nav>

  <main class="product-main container">
    <div class="product-gallery" id="product-gallery">
      <div class="gallery-container">
        <div class="gallery-slider" id="gallery-slider">
          <img id="main-image" src="https://cf.ppt-online.org/files1/slide/u/uYbWEvFwknVKpehMqQyo76g9fISjGCaR3Hs2UtTczx/slide-3.jpg" alt="111" class="gallery-main-image">
        </div>
        <div class="gallery-dots" id="gallery-dots"></div>
        <button class="gallery-arrow left" id="gallery-left">‹</button>
        <button class="gallery-arrow right" id="gallery-right">›</button>
      </div>
    </div>
    <div class="product-details">
      <h1 id="product-title">111</h1>
      <div class="rating-row" id="rating-row">
        <span class="rating-star">★</span>
        <span class="rating-value" id="avg-rating">5.0</span>
        <span class="review-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span id="review-count">1</span>
        </span>
      </div>
      <p id="product-description">222</p>
      <div class="product-price" id="product-price">123 ₽</div>
      <div class="old-price-block" id="old-price-block" style="display:none;">
        <span class="old-price" id="old-price-value"></span>
        <span class="discount-badge" id="discount-badge"></span>
      </div>
      <div class="variant-pills" id="variant-pills">
        
      </div>
      <div class="stock-info" id="stock-info">Осталось: 2 шт.</div>
      <div class="quantity-row">
        <div class="quantity-picker" id="quantity-picker" style="display: none;">
          <button class="qty-btn" id="qty-decrease">−</button>
          <span class="qty-value" id="qty-value">0</span>
          <button class="qty-btn" id="qty-increase">+</button>
        </div>
        <button class="go-to-cart" id="go-to-cart-btn" style="display: none;">🛒</button>
      </div>
      <div class="product-message" id="product-message"></div>
    </div>
  </main>

  <section class="also-interesting container">
    <h3>Также может быть интересно:</h3>
    <div class="also-scroll" id="also-interesting-scroll"></div>
  </section>

  <section class="reviews-section container">
    <h2>Отзывы</h2>
    <div class="review-form">
      <h3>Оставить отзыв</h3>
      <div class="author-avatar">
        <div class="avatar-icon">👤</div>
        <input type="text" id="review-author" placeholder="Ваше имя" required>
      </div>
      <label class="star-rating-label">Оцените товар:</label>
      <div class="star-rating" id="star-rating">
        <span data-rating="1">☆</span><span data-rating="2">☆</span><span data-rating="3">☆</span><span data-rating="4">☆</span><span data-rating="5">☆</span>
      </div>
      <textarea id="review-text" rows="3" placeholder="Ваш комментарий"></textarea>
      <button id="submit-review" class="btn">Отправить</button>
      <p id="review-message" class="error-message"></p>
    </div>
    <div id="reviews-list"></div>
  </section>

  <div class="modal" id="cart-modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Корзина</h2>
      <div id="cart-items"></div>
      <div class="cart-total"><strong>Итого: <span id="cart-total-price">0</span> ₽</strong></div>
      <button id="checkout-btn" class="btn">Оформить заказ</button>
    </div>
  </div>

  <button class="cart-float-btn" id="cart-float-btn">
    🛒
    <span class="cart-count-badge" id="cart-count">0</span>
  </button>
</body>
</html>
