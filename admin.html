<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/admin.js"></script>
</head>
<body>
  <div id="login-screen" class="screen">
    <div class="login-box">
      <h1>Вход в админ-панель</h1>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Пароль" required>
        <button type="submit" class="btn">Войти</button>
      </form>
      <p id="login-error" class="error"></p>
    </div>
  </div>

  <div id="admin-screen" class="screen" style="display: none;">
    <header class="admin-header">
      <h1>Админ-панель</h1>
      <button id="logout-btn" class="btn-outline">Выйти</button>
    </header>

    <div class="deploy-panel">
      <p>⚡ После добавления новых товаров нажмите кнопку, чтобы обновить сайт.</p>
      <button id="deploy-btn" class="btn-deploy">🚀 Обновить сайт</button>
      <button id="info-btn" class="btn-info" title="Информация">i</button>
      <span id="deploy-status"></span>
    </div>

    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="products">Товары</button>
      <button class="tab-btn" data-tab="orders">Заказы</button>
      <button class="tab-btn" data-tab="reviews">Отзывы</button>
    </div>

    <div id="tab-products" class="tab-content active">
      <div class="toolbar">
        <button id="add-product-btn" class="btn">+ Добавить товар</button>
      </div>
      <div id="products-list" class="products-list"></div>
    </div>

    <div id="tab-orders" class="tab-content">
      <div id="orders-list"><p>Заказы появятся после первых оплат.</p></div>
    </div>

    <div id="tab-reviews" class="tab-content">
      <div id="reviews-list-admin"><p>Загрузка отзывов…</p></div>
    </div>

    <div id="product-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modal-title">Добавить товар</h2>
        <form id="product-form">
          <input type="hidden" id="product-id">
          <label>Название</label>
          <input type="text" id="product-title" required>
          <label>Описание</label>
          <textarea id="product-description" rows="3" required></textarea>
          <label>Цена (₽)</label>
          <input type="number" id="product-price" required>
          <label>Остаток (шт) – если без вариантов</label>
          <input type="number" id="product-stock" value="0">
          <label>Главное изображение</label>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="url" id="product-image" placeholder="https://..." style="flex:1;">
            <input type="file" id="main-image-file" accept="image/*" style="display:none;">
            <button type="button" id="upload-main-image-btn" class="btn-sm">📁 Загрузить</button>
          </div>
          <label>Доп. изображения</label>
          <div id="additional-images-container"></div>
          <button type="button" id="add-image-btn" class="btn-sm" style="width:auto; margin-top:5px;">+ Изображение (URL)</button>
          <button type="button" id="upload-extra-image-btn" class="btn-sm" style="width:auto; margin-top:5px;">📁 Загрузить доп. фото</button>
          <input type="file" id="extra-image-file" accept="image/*" style="display:none;">

          <label style="margin-top:15px;">Варианты (размеры)</label>
          <div id="variants-list"></div>
          <button type="button" id="add-variant-btn" class="btn-sm" style="width:auto; margin-top:5px;">+ Добавить размер</button>

          <label class="checkbox-label">
            <input type="checkbox" id="product-has-badge"> Показывать бирку
          </label>
          <div id="badge-settings" style="display:none;">
            <label>Текст бирки</label>
            <input type="text" id="badge-text" placeholder="Хит, Скидка...">
            <label>Цвет фона</label>
            <input type="color" id="badge-bg" value="#e53e3e">
            <label>Цвет текста</label>
            <input type="color" id="badge-color" value="#ffffff">
          </div>

          <label class="checkbox-label">
            <input type="checkbox" id="product-has-old-price"> Старая цена
          </label>
          <div id="old-price-settings" style="display:none;">
            <label>Старая цена (₽)</label>
            <input type="number" id="old-price-value" value="0">
          </div>

          <label class="checkbox-label">
            <input type="checkbox" id="product-sale"> Распродажа (для фильтра)
          </label>

          <button type="submit" class="btn" style="margin-top:15px;">Сохранить</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
