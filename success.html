<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заказ оплачен</title>
  <style>
    :root {
      --primary: #2b6cb0;
      --text: #2d3748;
      --text-light: #718096;
      --light-bg: #f8f9fa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--light-bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .success-card {
      background: white;
      border-radius: 16px;
      padding: 60px 40px;
      text-align: center;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }

    .checkmark {
      width: 80px;
      height: 80px;
      background: #38a169;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
    }

    .checkmark::after {
      content: '';
      width: 20px;
      height: 35px;
      border: solid white;
      border-width: 0 5px 5px 0;
      transform: rotate(45deg);
      margin-top: -8px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 15px;
      color: var(--text);
    }

    p {
      color: var(--text-light);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 14px 40px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #1a4c7a;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="checkmark"></div>
    <h1>Заказ оплачен!</h1>
    <p>Спасибо за покупку. Мы уже получили ваш заказ и скоро свяжемся с вами для подтверждения доставки.</p>
    <a href="/" class="btn">Вернуться в магазин</a>
  </div>
</body>
</html>
