<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заказ оплачен</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f6fb; }
    .success-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
    h1 { color: #38a169; margin-bottom: 10px; }
    p { color: #5a6577; margin-bottom: 25px; }
    a { display: inline-block; background: #2b6cb0; color: white; padding: 12px 30px; border-radius: 10px; text-decoration: none; font-weight: 600; }
    a:hover { background: #1a4c7a; }
  </style>
</head>
<body>
  <div class="success-box">
    <h1>✅ Оплата прошла успешно!</h1>
    <p>Спасибо за заказ. Мы свяжемся с вами для подтверждения.</p>
    <a href="index.html?refresh=1">Вернуться в магазин</a>
  </div>
</body>
</html>
