<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Магазин</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase App (the core Firebase SDK) -->
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>
  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <h1>Добро пожаловать в магазин</h1>
      <p>Лучшие товары с доставкой</p>
    </div>
  </section>

  <!-- Каталог -->
  <section class="catalog" id="catalog">
    <div class="container">
      <h2>Товары</h2>
      <div class="products-grid" id="products-container">
        <!-- Карточки будут генерироваться JS -->
      </div>
    </div>
  </section>

  <!-- Информационный блок -->
  <section class="info">
    <div class="container">
      <h2>Почему мы?</h2>
      <div class="info-cards">
        <div class="info-card">
          <h3>Быстрая доставка</h3>
          <p>Доставляем по всей стране через СДЭК</p>
        </div>
        <div class="info-card">
          <h3>Качество</h3>
          <p>Только проверенные товары</p>
        </div>
        <div class="info-card">
          <h3>Поддержка</h3>
          <p>Ответим на любые вопросы</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Модальное окно корзины -->
  <div class="modal" id="cart-modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Корзина</h2>
      <div id="cart-items"></div>
      <div class="cart-total">
        <strong>Итого: <span id="cart-total-price">0</span> ₽</strong>
      </div>
      <button id="checkout-btn" class="btn">Оформить заказ</button>
    </div>
  </div>

  <!-- Кнопка корзины (фиксированная) -->
  <button class="cart-float-btn" id="cart-float-btn">
    🛒 <span id="cart-count">0</span>
  </button>

</body>
</html>
