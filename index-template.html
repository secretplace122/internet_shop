<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Магазин – каталог товаров</title>
  <meta name="description" content="Лучшие товары с доставкой. Широкий ассортимент, низкие цены.">
  <base href="/internet_shop/">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/app.js"></script>
  <script src="https://www.google.com/recaptcha/api.js?render=6Ldue0wtAAAAAI-20EzQTUORuxLArIS9R3zmHOsL"></script>
</head>
<body>
  <nav id="main-nav" class="main-nav">
    <div class="nav-pill" id="nav-pill">
      <button class="nav-toggle" id="nav-toggle" aria-label="Меню">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16M4 12h16M4 19h16"/></svg>
        <span class="nav-brand">Магазин</span>
      </button>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link">Главная</a>
        <a href="index.html#catalog" class="nav-link">Каталог</a>
        <a href="#" class="nav-link" id="nav-cart">Корзина</a>
        <a href="index.html#info" class="nav-link">Контакты</a>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="container">
      <h1>Добро пожаловать в магазин</h1>
      <p>Лучшие товары с доставкой</p>
    </div>
  </section>

  <section class="catalog" id="catalog">
    <div class="container">
      <h2>Товары</h2>
      <button class="filter-toggle" id="filter-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 21v-7m0-4V3m8 18v-9m0-4V3m8 18v-5m0-4V3M1 14h6m2-6h6m2 8h6"/></svg>
        Фильтры
      </button>
      <div class="filter-bar" id="filter-bar">
        <div class="filter-group">
          <label for="filter-price-from">Цена от</label>
          <input type="number" id="filter-price-from" placeholder="0" min="0">
        </div>
        <div class="filter-group">
          <label for="filter-price-to">до</label>
          <input type="number" id="filter-price-to" placeholder="100000" min="0">
        </div>
        <div class="filter-group">
          <label class="checkbox-label">
            <input type="checkbox" id="filter-rating-4"> ★ 4 и выше
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="filter-rating-5"> ★ 5
          </label>
        </div>
        <div class="filter-group">
          <label class="checkbox-label">
            <input type="checkbox" id="filter-sale"> Распродажа
          </label>
        </div>
        <button class="btn-reset" id="filter-reset">Сбросить</button>
      </div>
      <div class="products-grid" id="products-container"></div>
    </div>
  </section>

  <section class="info" id="info">
    <div class="container">
      <h2>Почему мы?</h2>
      <div class="info-cards">
        <div class="info-card"><h3>Быстрая доставка</h3><p>Доставляем по всей стране</p></div>
        <div class="info-card"><h3>Качество</h3><p>Проверенные товары</p></div>
        <div class="info-card"><h3>Поддержка</h3><p>Ответим на вопросы</p></div>
      </div>
    </div>
  </section>

  <div class="modal" id="cart-modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Корзина</h2>
      <div id="cart-items"></div>
      <div class="cart-total"><strong>Итого: <span id="cart-total-price">0</span> ₽</strong></div>
      <button id="checkout-btn" class="btn">Оформить заказ</button>
    </div>
  </div>

  <button class="cart-float-btn" id="cart-float-btn">
    🛒
    <span class="cart-count-badge" id="cart-count">0</span>
  </button>
</body>
</html>
